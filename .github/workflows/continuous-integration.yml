# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build on Win-MacOS-Ubuntu with Python 3.11-3.13

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'Content/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  
jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest,  macos-latest] #, macos-13] # opensim not supported on macos Intel AMD x64 beyond python 3.11
        python-version: ["3.10", "3.11", "3.12"] # dropped 3.10, not supported by opensim outside of conda

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install flake8 pytest
          uv pip install opensim
          uv pip install git+https://github.com/${{ github.repository }}.git@${{ github.sha }}
          # uv pip install torch torchvision
      
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv
                
      - name: Test with pytest
        env: 
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
          KMP_DUPLICATE_LIB_OK: TRUE
        run: |
          uv run pytest -v Sports2D/Utilities/tests.py --capture=sys
